{% extends "layout.html" %}
{% block content %}
<div class="content-card" style="padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="color: #6a1b9a; margin-bottom: 20px;">Laporan & Administrasi</h2>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">

    <div style="margin-bottom: 40px;">
        <h3 style="margin-bottom: 10px;">Export Data Mahasiswa</h3>
        <p style="color: #666; margin-bottom: 20px;">Klik tombol di bawah untuk mengunduh daftar mahasiswa ke format Excel.</p>
        <a href="{{ url_for('export_excel') }}" style="background: #007bff; color: white; padding: 12px 25px; border-radius: 5px; text-decoration: none; display: inline-block; font-weight: bold;">
            Download Laporan (.xlsx)
        </a>
    </div>

    <div style="padding-top: 20px; border-top: 1px dashed #ccc;">
        <h3 style="margin-bottom: 10px;">Upload Surat Izin / Sakit</h3>
        <p style="color: #666; margin-bottom: 15px;">Pilih file dari perangkat Anda.</p>
        <form action="/upload_surat" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required style="display: block; margin-bottom: 15px;">
            <button type="submit" style="background: #28a745; color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Upload File
            </button>
        </form>
    </div>
</div>
{% endblock %}
