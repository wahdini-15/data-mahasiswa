{% extends "layout.html" %}

{% block content %}
<div style="padding: 40px; max-width: 500px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 20px;">Tambah Mahasiswa Baru</h2>
    <form action="/tambah" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" name="nim" placeholder="NIM" required style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <input type="text" name="nama" placeholder="Nama Lengkap" required style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <input type="text" name="jurusan" placeholder="Jurusan" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <input type="email" name="email" placeholder="Email" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <input type="text" name="telp" placeholder="Telepon" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        
        <button type="submit" style="padding: 12px; background: #6a1b9a; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Simpan Data
        </button>
        <a href="/mahasiswa" style="text-align: center; color: #6a1b9a; text-decoration: none;">Kembali</a>
    </form>
</div>
{% endblock %}
