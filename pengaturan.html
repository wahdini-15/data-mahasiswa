{% extends "layout.html" %}
{% block content %}
<div class="content-card" style="padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="color: #6a1b9a; margin-bottom: 20px;">Pengaturan Akun</h2>
    <hr style="margin-bottom: 30px;">

    <form action="/update_settings" method="POST">
        <div style="margin-bottom: 20px;">
            <label><strong>Ganti Password Baru:</strong></label><br>
            <input type="password" name="password" placeholder="Masukkan password baru" 
                   style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px;">
        </div>

        <button type="submit" style="background: #6a1b9a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
            Simpan Password
        </button>
    </form>

    <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 5px;">
        <p><strong>Terakhir login:</strong> {{ mhs.get('last_login', 'Belum pernah') }}</p>
    </div>
</div>
{% endblock %}
