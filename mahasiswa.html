{% extends "layout.html" %}

{% block content %}
<div class="content-wrapper" style="padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="/tambah" style="background: #6a1b9a; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold;">
            + Tambah Mahasiswa
        </a>
        
        <select onchange="window.location.href='/mahasiswa?sort=' + this.value" style="padding: 10px; border-radius: 5px;">
            <option value="">Urutkan berdasarkan...</option>
            <option value="nim">NIM</option>
            <option value="nama">Nama</option>
        </select>
    </div>

    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <h2 style="margin-bottom: 20px;">Daftar Mahasiswa</h2>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid #ddd;">
                    <th style="padding: 10px; text-align: left;">NIM</th>
                    <th style="padding: 10px; text-align: left;">NAMA</th>
                    <th style="padding: 10px; text-align: left;">JURUSAN</th>
                    <th style="padding: 10px; text-align: left;">EMAIL</th>
                    <th style="padding: 10px; text-align: left;">TELP</th>
                    <th style="padding: 10px; text-align: left;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for m in mahasiswa %}
                <tr>
                    <td style="padding: 10px;">{{ m.nim }}</td>
                    <td style="padding: 10px;">{{ m.nama }}</td>
                    <td style="padding: 10px;">{{ m.jurusan }}</td>
                    <td style="padding: 10px;">{{ m.email }}</td>
                    <td style="padding: 10px;">{{ m.telp }}</td>
                    
                    <td style="padding: 10px;">
                        <a href="{{ url_for('lihat', nim=m.nim) }}" style="color: blue; text-decoration: none;">Lihat</a> | 
                        <a href="{{ url_for('edit', nim=m.nim) }}" style="color: green; text-decoration: none;">Edit</a> |
                        <a href="{{ url_for('hapus', nim=m.nim) }}" style="color: red; text-decoration: none;" onclick="return confirm('Yakin ingin hapus?')">Hapus</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
